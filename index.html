<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora IMC Pro</title>
    <style>
        /* CSS: Layout Moderno e Responsivo */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 380px;
            text-align: center;
        }

        h2 { color: #333; margin-bottom: 1.5rem; }

        .input-group {
            text-align: left;
            margin-bottom: 1rem;
        }

        label { display: block; margin-bottom: 5px; color: #666; font-size: 0.9rem; }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e1e1e1;
            border-radius: 8px;
            box-sizing: border-box; /* Garante que o padding não quebre o layout */
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        input:focus { border-color: #4a90e2; outline: none; }

        button {
            width: 100%;
            padding: 14px;
            background-color: #4a90e2;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.3s;
        }

        button:hover { background-color: #357abd; }

        /* Estilo do Resultado */
        #resultado {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none; /* Invisível até o cálculo */
            animation: fadeIn 0.5s;
        }

        .abaixo { background: #ffeb3b; color: #856404; }
        .normal { background: #c8e6c9; color: #256029; }
        .sobrepeso { background: #ffe0b2; color: #855406; }
        .obesidade { background: #ffcdd2; color: #c62828; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="card">
    <h2>Calculadora de IMC</h2>
    
    <div class="input-group">
        <label>Peso (kg)</label>
        <input type="number" id="peso" placeholder="Ex: 75.5" step="0.1">
    </div>

    <div class="input-group">
        <label>Altura (m)</label>
        <input type="number" id="altura" placeholder="Ex: 1.75" step="0.01">
    </div>

    <button id="btnCalcular">Calcular Agora</button>

    <div id="resultado"></div>
</div>

<script>
    // JS: Lógica funcional
    const btn = document.getElementById('btnCalcular');
    
    btn.addEventListener('click', function() {
        const peso = parseFloat(document.getElementById('peso').value);
        const altura = parseFloat(document.getElementById('altura').value);
        const display = document.getElementById('resultado');

        if (isNaN(peso) || isNaN(altura) || altura <= 0) {
            alert("Por favor, insira valores válidos.");
            return;
        }

        const imc = (peso / (altura * altura)).toFixed(1);
        let classe = "";
        let msg = "";

        if (imc < 18.5) {
            classe = "abaixo";
            msg = "Abaixo do peso";
        } else if (imc < 25) {
            classe = "normal";
            msg = "Peso normal";
        } else if (imc < 30) {
            classe = "sobrepeso";
            msg = "Sobrepeso";
        } else {
            classe = "obesidade";
            msg = "Obesidade";
        }

        display.className = classe; // Aplica a cor baseada na categoria
        display.style.display = "block";
        display.innerHTML = `<strong>Seu IMC é ${imc}</strong><br>${msg}`;
    });
</script>

</body>
</html>
